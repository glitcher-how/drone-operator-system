<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Drone Operator{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="nav">
        <a href="{{ url_for('main.index') }}">Главная</a>
        <a href="{{ url_for('drones.drones_page') }}">Дроны</a>
        <a href="{{ url_for('droneports.droneports_page') }}">Дронопорты</a>
        <a href="{{ url_for('orders.orders_page') }}">Заказы-наряды</a>
        <a href="{{ url_for('events.events_page') }}">Журнал событий</a>
    </div>

    {% with messages = get_flashed_messages() %}
      {% if messages %}
        {% for message in messages %}
          <div class="flash">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    {% block content %}{% endblock %}
</body>
</html>
